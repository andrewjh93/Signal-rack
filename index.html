<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
      <line x1="22" y1="9" x2="16" y2="15" />
      <line x1="16" y1="9" x2="22" y2="15" />

  );
}
function IconAlertTriangle({ size = 12, strokeWidth = 2.4 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
      <line x1="12" y1="9" x2="12" y2="13" />
      <line x1="12" y1="17" x2="12.01" y2="17" />

/* ---------------------------------------------------------------
   Signal Rack — CG-600 · 6-Channel Function Generator
   --------------------------------------------------------------- */

const CHANNEL_COLORS = [
  "#f2a33e", // 1 amber
  "#4dd8e0", // 2 cyan
  "#e05ac2", // 3 magenta
  "#6be86b", // 4 green
  "#a67bf0", // 5 violet
  "#ef5b5b", // 6 red
];

const WAVE_ORDER = ["sine", "square", "triangle", "sawtooth"];

const WAVE_META = {
  sine: { label: "SINE", d: "M1,8 C4,1 8,1 11,8 C14,15 18,15 21,8 C24,1 28,1 31,8" },
  square: { label: "SQR", d: "M1,13 L1,3 L9,3 L9,13 L17,13 L17,3 L25,3 L25,13 L31,13" },
  triangle: { label: "TRI", d: "M1,13 L8,3 L16,13 L24,3 L31,13" },
  sawtooth: { label: "SAW", d: "M1,13 L1,3 L9,13 L9,3 L17,13 L17,3 L25,13 L25,3 L31,13" },
};

const RANGES = [
  { label: "×1", sub: "Hz", mult: 1 },
  { label: "×10", sub: "Hz", mult: 10 },
  { label: "×100", sub: "Hz", mult: 100 },
  { label: "×1", sub: "kHz", mult: 1000 },
  { label: "×10", sub: "kHz", mult: 10000 },
];

const MAX_LAYERS = 8;
let layerSeq = 0;
function newLayerId() {
  layerSeq += 1;
  return `layer_${layerSeq}`;
}

function makeLayer(type) {
  return {
    id: newLayerId(),
    type,
    phase: 0,
    amplitude: 100,
    duty: 50,
    pwmRate: 0,
    pwmDepth: 0,
  };
}

function makeChannel(id, types) {
  return {
    id,
    color: CHANNEL_COLORS[id - 1],
    on: true,
    layers: types.map((t) => makeLayer(t)),
    coarse: 4.4 + id * 3.1,
    range: 1,
    fine: 0,
    syncSource: null,
    syncRatio: 1,
  };
}

const INITIAL_CHANNELS = [
  makeChannel(1, ["sine", "square"]),
  makeChannel(2, ["sine"]),
  makeChannel(3, ["triangle"]),
  makeChannel(4, ["sawtooth"]),
  makeChannel(5, ["square"]),
  makeChannel(6, ["square", "triangle"]),
];

function sample(type, t, duty, phaseDeg = 0) {
  const shifted = t + phaseDeg / 360;
  const frac = shifted - Math.floor(shifted);
  switch (type) {
    case "sine":
      return Math.sin(2 * Math.PI * frac);
    case "square":
      return frac < duty / 100 ? 1 : -1;
    case "triangle":
      return 4 * Math.abs(frac - 0.5) - 1;
    case "sawtooth":
      return 2 * frac - 1;
    default:
      return 0;
  }
}

const SYNC_RATIOS = [
  { label: "÷4", value: 0.25 },
  { label: "÷2", value: 0.5 },
  { label: "×1", value: 1 },
  { label: "×2", value: 2 },
  { label: "×4", value: 4 },
];

function clamp(v, lo, hi) {
  return Math.min(hi, Math.max(lo, v));
}

function ownFreq(ch) {
  return ch.coarse * ch.range * (1 + ch.fine / 1000);
}

// resolves a channel's effective frequency, following sync chains,
// with a guard against circular sync references
function resolveEffFreq(channels, ch, visited = new Set()) {
  if (!ch.syncSource || visited.has(ch.id)) return ownFreq(ch);
  const src = channels.find((c) => c.id === ch.syncSource);
  if (!src) return ownFreq(ch);
  visited.add(ch.id);
  return resolveEffFreq(channels, src, visited) * ch.syncRatio;
}

// would picking candidateId as ch's sync source create a cycle?
function createsCycle(channels, chId, candidateId) {
  let cur = candidateId;
  const guard = new Set();
  while (cur != null) {
    if (cur === chId) return true;
    if (guard.has(cur)) break;
    guard.add(cur);
    const c = channels.find((x) => x.id === cur);
    cur = c ? c.syncSource : null;
  }
  return false;
}

function fmtFreq(hz) {
  if (hz >= 1e6) return { v: (hz / 1e6).toFixed(4), u: "MHz" };
  if (hz >= 1e3) return { v: (hz / 1e3).toFixed(4), u: "kHz" };
  return { v: hz.toFixed(2), u: "Hz" };
}

// number layers of the same type: SINE, SINE 2, SINE 3 ...
function layerLabel(layers, layer) {
  const sameType = layers.filter((l) => l.type === layer.type);
  const base = WAVE_META[layer.type].label;
  if (sameType.length <= 1) return base;
  const ordinal = sameType.findIndex((l) => l.id === layer.id) + 1;
  return `${base} ${ordinal}`;
}

function WaveIcon({ type }) {
  const meta = WAVE_META[type];
  return (
    <svg width="26" height="14" viewBox="0 0 32 16" fill="none">
      <path
        d={meta.d}
        stroke="currentColor"
        strokeWidth="1.6"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
    </svg>
  );
}

function drawScope(canvas, ch) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, rect.width);
  const h = Math.max(1, rect.height);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  // graticule
  ctx.strokeStyle = "rgba(120,255,170,0.09)";
  ctx.lineWidth = 1;
  const rows = 4;
  const cols = 10;
  for (let i = 1; i < rows; i++) {
    const y = Math.round((h / rows) * i) + 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  for (let i = 1; i < cols; i++) {
    const x = Math.round((w / cols) * i) + 0.5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  ctx.strokeStyle = "rgba(120,255,170,0.22)";
  ctx.beginPath();
  ctx.moveTo(0, h / 2 + 0.5);
  ctx.lineTo(w, h / 2 + 0.5);
  ctx.stroke();

  if (!ch.on || ch.layers.length === 0) {
    ctx.fillStyle = "rgba(140,255,180,0.35)";
    ctx.font = "500 11px 'IBM Plex Mono', monospace";
    ctx.fillText(ch.on ? "NO WAVEFORM SELECTED" : "CHANNEL OFF", 10, h / 2 + 4);
    return;
  }

  const cycles = 2.5;
  const amp = h * 0.36;
  const mid = h / 2;

  ch.layers.forEach((layer, idx) => {
    const isPrimary = idx === 0;
    ctx.beginPath();
    ctx.lineWidth = isPrimary ? 2 : 1.3;
    ctx.strokeStyle = isPrimary ? ch.color : "rgba(255,255,255,0.5)";
    ctx.setLineDash(isPrimary ? [] : [5, 3]);
    const waveAmp = amp * (layer.amplitude / 100);
    const modulatesDuty = layer.type === "square";
    for (let x = 0; x <= w; x++) {
      const t = (x / w) * cycles;
      let duty = layer.duty;
      if (modulatesDuty && layer.pwmDepth > 0) {
        duty = clamp(layer.duty + layer.pwmDepth * Math.sin(2 * Math.PI * layer.pwmRate * t), 5, 95);
      }
      const y = mid - sample(layer.type, t, duty, layer.phase) * waveAmp;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

function ChannelModule({ ch, onUpdate, allChannels, audioOn }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);

  const redraw = useCallback(() => drawScope(canvasRef.current, ch), [ch]);

  useEffect(() => {
    redraw();
    const el = containerRef.current;
    if (!el || typeof ResizeObserver === "undefined") return;
    const ro = new ResizeObserver(() => redraw());
    ro.observe(el);
    return () => ro.disconnect();
  }, [redraw]);

  const addLayer = (type) => {
    if (ch.layers.length >= MAX_LAYERS) return;
    onUpdate({ ...ch, layers: [...ch.layers, makeLayer(type)] });
  };

  const removeLayer = (layerId) => {
    if (ch.layers.length <= 1) return;
    onUpdate({ ...ch, layers: ch.layers.filter((l) => l.id !== layerId) });
  };

  const updateLayer = (layerId, patch) => {
    onUpdate({
      ...ch,
      layers: ch.layers.map((l) => (l.id === layerId ? { ...l, ...patch } : l)),
    });
  };

  const eff = resolveEffFreq(allChannels, ch);
  const f = fmtFreq(eff);
  const atMax = ch.layers.length >= MAX_LAYERS;

  const syncSourceCh = ch.syncSource ? allChannels.find((c) => c.id === ch.syncSource) : null;
  const isSynced = !!syncSourceCh;
  const syncTargets = allChannels.filter(
    (c) => c.id !== ch.id && !createsCycle(allChannels, ch.id, c.id)
  );

  return (
    <div
      className="fg-module"
      style={{ "--ch-color": ch.color, opacity: ch.on ? 1 : 0.62 }}
    >
      <div className="fg-module-topline" style={{ background: ch.color }} />

      <div className="fg-header">
        <div className="fg-led-wrap">
          <span
            className="fg-led"
            style={{
              background: ch.on ? ch.color : "#2c2d30",
              boxShadow: ch.on ? `0 0 7px ${ch.color}, 0 0 2px ${ch.color}` : "none",
            }}
          />
          <span className="fg-ch-label">CH {ch.id}</span>
          {isSynced && (
            <span className="sync-badge" style={{ color: syncSourceCh.color, borderColor: syncSourceCh.color }}>
              <IconLink2 size={9} strokeWidth={2.4} />
              CH{ch.syncSource}
            </span>
          )}
        </div>
        <button
          className="fg-power-btn"
          onClick={() => onUpdate({ ...ch, on: !ch.on })}
          aria-pressed={ch.on}
          aria-label={`Toggle channel ${ch.id} power`}
        >
          <IconPower size={13} strokeWidth={2.4} />
        </button>
      </div>

      <div className="fg-screen" ref={containerRef}>
        <canvas ref={canvasRef} className="fg-canvas" />
        <div className="fg-scanlines" />
      </div>

      <div className="fg-section-head" style={{ marginBottom: 5 }}>
        <span>ADD LAYER</span>
        {atMax && <span style={{ color: "#5c615c" }}>MAX {MAX_LAYERS}</span>}
      </div>
      <div className="fg-wave-row">
        {WAVE_ORDER.map((type) => {
          const count = ch.layers.filter((l) => l.type === type).length;
          return (
            <button
              key={type}
              className="wave-chip"
              disabled={atMax}
              onClick={() => addLayer(type)}
              title={`Add ${WAVE_META[type].label} layer`}
            >
              {count > 0 && <span className="wave-chip-badge">{count}</span>}
              <WaveIcon type={type} />
              <span>{WAVE_META[type].label}</span>
            </button>
          );
        })}
      </div>

      <div className="fg-section">
        <div className="fg-section-head">
          <span>LAYERS</span>
          <span>{ch.layers.length}</span>
        </div>
        {ch.layers.map((layer, idx) => (
          <div className="layer-block" key={layer.id}>
            <div className="layer-head">
              <span
                className="phase-dot"
                style={{ background: idx === 0 ? ch.color : "rgba(255,255,255,0.5)" }}
              />
              <span className="layer-name">{layerLabel(ch.layers, layer)}</span>
              <button
                className="layer-remove"
                onClick={() => removeLayer(layer.id)}
                disabled={ch.layers.length === 1}
                aria-label={`Remove ${layerLabel(ch.layers, layer)} layer`}
              >
                <IconX size={11} strokeWidth={2.4} />
              </button>
            </div>

            <div className="fg-row">
              <span className="fg-mini-label">AMP</span>
              <input
                type="range"
                className="fx-range"
                min="0"
                max="100"
                step="5"
                value={layer.amplitude}
                onChange={(e) => updateLayer(layer.id, { amplitude: parseInt(e.target.value, 10) })}
              />
              <span className="fg-mini-val">{layer.amplitude}%</span>
            </div>

            <div className="fg-row">
              <span className="fg-mini-label">PHASE</span>
              <input
                type="range"
                className="fx-range"
                min="-180"
                max="180"
                step="5"
                value={layer.phase}
                onChange={(e) => updateLayer(layer.id, { phase: parseInt(e.target.value, 10) })}
              />
              <span className="fg-mini-val">{layer.phase}°</span>
            </div>

            {layer.type === "square" && (
              <>
                <div className="layer-pwm-label">PWM</div>
                <div className="fg-row">
                  <span className="fg-mini-label">DUTY</span>
                  <input
                    type="range"
                    className="fx-range"
                    min="5"
                    max="95"
                    step="1"
                    value={layer.duty}
                    onChange={(e) => updateLayer(layer.id, { duty: parseInt(e.target.value, 10) })}
                  />
                  <span className="fg-mini-val">{layer.duty}%</span>
                </div>
                <div className="fg-row">
                  <span className="fg-mini-label">RATE</span>
                  <input
                    type="range"
                    className="fx-range"
                    min="0"
                    max="10"
                    step="0.1"
                    value={layer.pwmRate}
                    onChange={(e) => updateLayer(layer.id, { pwmRate: parseFloat(e.target.value) })}
                  />
                  <span className="fg-mini-val">{layer.pwmRate.toFixed(1)} Hz</span>
                </div>
                <div className="fg-row">
                  <span className="fg-mini-label">DEPTH</span>
                  <input
                    type="range"
                    className="fx-range"
                    min="0"
                    max="45"
                    step="1"
                    value={layer.pwmDepth}
                    onChange={(e) => updateLayer(layer.id, { pwmDepth: parseInt(e.target.value, 10) })}
                  />
                  <span className="fg-mini-val">±{layer.pwmDepth}%</span>
                </div>
              </>
            )}
          </div>
        ))}
      </div>

      <div className="fg-section">
        <div className="fg-section-head">
          <span>SYNC</span>
          {isSynced && (
            <span className="fg-readout" style={{ fontSize: 11 }}>
              → CH{ch.syncSource} ×{ch.syncRatio}
            </span>
          )}
        </div>
        <div className="sync-row">
          <button
            className="sync-chip"
            data-active={!ch.syncSource}
            onClick={() => onUpdate({ ...ch, syncSource: null })}
          >
            OFF
          </button>
          {syncTargets.map((t) => (
            <button
              key={t.id}
              className="sync-chip"
              data-active={ch.syncSource === t.id}
              style={{ "--src-color": t.color }}
              onClick={() => onUpdate({ ...ch, syncSource: t.id })}
            >
              <span className="sync-dot" style={{ background: t.color }} />
              {t.id}
            </button>
          ))}
        </div>
        {isSynced && (
          <div className="fg-row" style={{ marginTop: 6, marginBottom: 0 }}>
            <span className="fg-mini-label">RATIO</span>
            <div className="fg-range-group">
              {SYNC_RATIOS.map((r) => (
                <button
                  key={r.value}
                  className="range-btn"
                  data-active={ch.syncRatio === r.value}
                  onClick={() => onUpdate({ ...ch, syncRatio: r.value })}
                >
                  {r.label}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="fg-section" style={isSynced ? { opacity: 0.4, pointerEvents: "none" } : undefined}>
        <div className="fg-section-head">
          <span>FREQUENCY</span>
          <span className="fg-readout">
            {f.v} <em>{f.u}</em>
          </span>
        </div>

        <div className="fg-row">
          <span className="fg-mini-label">COARSE</span>
          <input
            type="range"
            className="fx-range"
            min="0.1"
            max="99.9"
            step="0.1"
            value={ch.coarse}
            disabled={isSynced}
            onChange={(e) => onUpdate({ ...ch, coarse: parseFloat(e.target.value) })}
          />
          <span className="fg-mini-val">{ch.coarse.toFixed(1)}</span>
        </div>

        <div className="fg-range-group">
          {RANGES.map((r) => (
            <button
              key={r.mult}
              className="range-btn"
              data-active={ch.range === r.mult}
              disabled={isSynced}
              onClick={() => onUpdate({ ...ch, range: r.mult })}
            >
              {r.label}
              <sub>{r.sub}</sub>
            </button>
          ))}
        </div>

        <div className="fg-row">
          <span className="fg-mini-label">FINE</span>
          <input
            type="range"
            className="fx-range"
            min="-50"
            max="50"
            step="1"
            value={ch.fine}
            disabled={isSynced}
            onChange={(e) => onUpdate({ ...ch, fine: parseInt(e.target.value, 10) })}
          />
          <span className="fg-mini-val">
            {ch.fine > 0 ? "+" : ""}
            {ch.fine}%
          </span>
        </div>
      </div>

      <div className="fg-footer">
        <div className="jack">
          <span
            className="jack-dot"
            style={{ background: ch.on && audioOn ? ch.color : "#444" }}
          />
          OUT
        </div>
        <div className="jack">
          <span className="jack-dot" style={{ background: "#555" }} />
          TRIG
        </div>
      </div>
    </div>
  );
}

function FunctionGeneratorRack() {
  const [channels, setChannels] = useState(INITIAL_CHANNELS);
  const [audioOn, setAudioOn] = useState(false);
  const [audioError, setAudioError] = useState(null);
  const [masterVolume, setMasterVolume] = useState(0.2);

  const updateChannel = (updated) => {
    setChannels((prev) => prev.map((c) => (c.id === updated.id ? updated : c)));
  };

  // refs so the realtime audio callback always sees current values
  // without having to tear down / rebuild the audio graph on every change
  const channelsRef = useRef(channels);
  const volumeRef = useRef(masterVolume);
  const audioCtxRef = useRef(null);
  const nodeRef = useRef(null);
  const phaseRef = useRef({});
  const clockRef = useRef(0);

  useEffect(() => {
    channelsRef.current = channels;
  }, [channels]);

  useEffect(() => {
    volumeRef.current = masterVolume;
  }, [masterVolume]);

  const stopAudio = useCallback(() => {
    if (nodeRef.current) {
      nodeRef.current.disconnect();
      nodeRef.current.onaudioprocess = null;
      nodeRef.current = null;
    }
    if (audioCtxRef.current) {
      audioCtxRef.current.close().catch(() => {});
      audioCtxRef.current = null;
    }
    phaseRef.current = {};
    clockRef.current = 0;
  }, []);

  const startAudio = useCallback(() => {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) {
      setAudioError("Web Audio isn't supported in this browser.");
      return false;
    }
    try {
      const ctx = new AudioCtx();
      const bufferSize = 2048;
      const node = ctx.createScriptProcessor(bufferSize, 0, 1);
      const sampleRate = ctx.sampleRate;

      node.onaudioprocess = (e) => {
        const out = e.outputBuffer.getChannelData(0);
        const chans = channelsRef.current;
        const vol = volumeRef.current;
        const active = chans.filter((c) => c.on && c.layers.length > 0);
        const norm = Math.max(1, active.length);

        for (let i = 0; i < bufferSize; i++) {
          const tSec = clockRef.current;
          let mix = 0;

          for (const ch of active) {
            const freq = resolveEffFreq(chans, ch);
            let ph = phaseRef.current[ch.id] || 0;
            ph = (ph + freq / sampleRate) % 1;
            phaseRef.current[ch.id] = ph;

            let chSample = 0;
            for (const layer of ch.layers) {
              let duty = layer.duty;
              if (layer.type === "square" && layer.pwmDepth > 0) {
                duty = clamp(
                  layer.duty + layer.pwmDepth * Math.sin(2 * Math.PI * layer.pwmRate * tSec),
                  5,
                  95
                );
              }
              chSample += sample(layer.type, ph, duty, layer.phase) * (layer.amplitude / 100);
            }
            chSample /= ch.layers.length;
            mix += chSample;
          }

          mix = (mix / norm) * vol;
          out[i] = Math.max(-1, Math.min(1, mix));
          clockRef.current += 1 / sampleRate;
        }
      };

      node.connect(ctx.destination);
      audioCtxRef.current = ctx;
      nodeRef.current = node;
      setAudioError(null);
      return true;
    } catch (err) {
      setAudioError("Couldn't start audio output.");
      return false;
    }
  }, []);

      setAudioOn(false);
    } else {
